name: Android build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "**"
    paths:
      - "composeApp/**"
      - "gradle/**"
      - "gradle.properties"
      - "**/gradle-wrapper.properties"
      - "**/*.gradle.kts"
      - ".github/workflows/android-build.yml"
  push:
    branches:
      - cmp-rewrite
      - main
    paths:
      - "composeApp/**"
      - "gradle/**"
      - "gradle.properties"
      - "**/gradle-wrapper.properties"
      - "**/*.gradle.kts"
      - ".github/workflows/android-build.yml"

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: "-Dkotlin.native.ignoreDisabledTargets=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: |
            platforms;android-36
            build-tools;35.0.0

      - name: Grant Gradle permissions
        run: chmod +x ./gradlew

      - name: Configure SDK location
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Assemble Full Debug
        run: ./gradlew :composeApp:assembleFullDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-full-debug
          path: composeApp/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error
